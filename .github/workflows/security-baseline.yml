name: Security baseline

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-baseline-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repository-guard:
    name: Repository guard
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out the reviewed revision
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Scan repository policy and history
        shell: bash
        run: python3 scripts/security/repository_guard.py --root . --history
